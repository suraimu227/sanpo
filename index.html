<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DQW 3D - Solid Sync & Emotes</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'DotGothic16', 'Press Start 2P', cursive; touch-action: none; }
        #gui { position: absolute; top: 15px; right: 15px; z-index: 1000; background: #000; color: #fff; padding: 15px; border: 4px solid #fff; width: 160px; text-align: center; }
        #clock-text { font-size: 16px; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        #weather-info { font-size: 12px; line-height: 1.45; margin-bottom: 12px; border-top: 2px solid #fff; padding-top: 8px; color: #ddd; }
        #debug-update-btn { background: #444; color: #fff; border: 2px solid #fff; padding: 5px; font-family: 'DotGothic16', 'Press Start 2P'; font-size: 9px; cursor: pointer; width: 100%; }
        #bag-gui { position: absolute; bottom: 20px; left: 20px; z-index: 1100; display: flex; gap: 8px; }
        #bag-btn { background: #000; color: #fff; border: 3px solid #fff; padding: 10px 15px; font-family: 'DotGothic16', 'Press Start 2P'; font-size: 12px; cursor: pointer; }
        #player-btn, #quest-btn { background: #000; color: #fff; border: 3px solid #fff; padding: 10px 12px; font-family: 'DotGothic16', 'Press Start 2P'; font-size: 12px; cursor: pointer; }
        #inventory-window { position: absolute; bottom: 60px; left: 0; width: 220px; background: #000; border: 3px solid #fff; color: #fff; padding: 15px; display: none; font-size: 10px; line-height: 1.8; }
        #player-window { position: absolute; bottom: 60px; left: 230px; width: 280px; background: #000; border: 3px solid #fff; color: #fff; padding: 12px; display: none; font-size: 12px; line-height: 1.55; }
        #quest-window { position: absolute; bottom: 60px; left: 520px; width: 280px; background: #000; border: 3px solid #fff; color: #fff; padding: 12px; display: none; font-size: 12px; line-height: 1.5; }
        #player-info { border-top: 2px solid #fff; margin-top: 8px; padding-top: 8px; }
        #player-items { max-height: 140px; overflow-y: auto; border-top: 2px solid #fff; margin-top: 8px; padding-top: 8px; }
        #quest-list { border-top: 2px solid #fff; margin-top: 8px; padding-top: 8px; max-height: 170px; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
        .item-act { background: #111; color: #fff; border: 1px solid #fff; font-size: 11px; cursor: pointer; }
        .save-btn { background: #111; color: #fff; border: 1px solid #fff; font-size: 11px; padding: 4px 8px; cursor: pointer; margin-top: 6px; }
        #message-window { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 1500; background: #000; border: 4px solid #fff; color: #fff; padding: 15px 25px; font-size: 10px; min-width: 280px; display: none; text-align: center; }
        #map-loading { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        #map-loading.visible { display: flex; }
        .load-window { background: #000; border: 4px solid #fff; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .load-text { color: #fff; font-size: 10px; margin-bottom: 20px; }
        .small-load-bar { width: 200px; height: 12px; border: 2px solid #fff; position: relative; overflow: hidden; }
        .small-load-fill { height: 100%; width: 70px; background: #fff; position: absolute; animation: bar-move 1.2s linear infinite; }
        .battle-window { position: fixed; z-index: 2200; background: #000; border: 4px solid #fff; color: #fff; padding: 10px; display: none; }
        #battle-status-window { left: 20px; bottom: 20px; width: 320px; }
        #battle-command-window { right: 20px; bottom: 20px; width: 260px; }
        #battle-title { font-size: 16px; margin-bottom: 6px; letter-spacing: 1px; }
        .battle-hp { font-size: 14px; line-height: 1.6; margin-bottom: 8px; border-top: 2px solid #fff; border-bottom: 2px solid #fff; padding: 6px 0; }
        #battle-log { min-height: 44px; font-size: 14px; line-height: 1.5; color: #fff; white-space: pre-line; }
        .battle-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .battle-btn { background: #101010; color: #fff; border: 2px solid #fff; padding: 8px 6px; font-family: 'DotGothic16', 'Press Start 2P'; font-size: 14px; cursor: pointer; }
        @keyframes bar-move { 0% { left: -70px; } 100% { left: 100%; } }

        #prep-btn, #story-btn { background: #000; color: #fff; border: 3px solid #fff; padding: 10px 12px; font-family: 'DotGothic16', 'Press Start 2P'; font-size: 12px; cursor: pointer; }
        .game-overlay { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
        .game-overlay.open { display: flex; }
        .overlay-panel { background: #000; border: 4px solid #fff; color: #fff; width: min(520px, 96vw); max-height: 88vh; overflow: hidden; display: flex; flex-direction: column; }
        .overlay-title { padding: 12px 14px; border-bottom: 2px solid #fff; font-size: 16px; }
        .overlay-tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; border-bottom: 2px solid #444; }
        .overlay-tab { flex: 1; min-width: 70px; background: #222; color: #fff; border: 2px solid #666; padding: 8px 4px; font-family: 'DotGothic16'; font-size: 11px; cursor: pointer; }
        .overlay-tab.active { border-color: #fff; background: #444; }
        .overlay-body { padding: 12px; overflow-y: auto; font-size: 12px; line-height: 1.6; flex: 1; touch-action: auto; }
        .overlay-close { margin: 10px; padding: 10px; background: #333; color: #fff; border: 2px solid #fff; font-family: 'DotGothic16'; cursor: pointer; }
        .prep-equip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }
        .story-goal-card { border: 2px solid #555; padding: 8px; margin-bottom: 8px; }
        .story-goal-card.done { border-color: #7f7; opacity: 0.75; }
        #story-goal-form input, #story-goal-form textarea { width: 100%; box-sizing: border-box; background: #111; color: #fff; border: 1px solid #fff; font-family: 'DotGothic16'; font-size: 11px; margin-bottom: 6px; padding: 6px; }
        #story-goal-form textarea { min-height: 60px; resize: vertical; }
        .overlay-action { background: #222; color: #fff; border: 1px solid #fff; padding: 6px 10px; font-family: 'DotGothic16'; font-size: 11px; cursor: pointer; margin-top: 4px; }

        #status-bar { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border: 3px solid #fff; font-size: 14px; min-width: 120px; pointer-events: none; }
        #status-lv { font-size: 12px; color: #ff0; margin-bottom: 4px; }
        #status-hp-text, #status-mp-text { position: relative; z-index: 2; }
        #status-hp-bar, #status-mp-bar { background: #444; height: 16px; position: relative; margin-bottom: 4px; border: 1px solid #888; overflow: hidden; }
        #status-hp-fill { background: #0f0; height: 100%; position: absolute; top: 0; left: 0; transition: width 0.3s; }
        #status-mp-fill { background: #00f; height: 100%; position: absolute; top: 0; left: 0; transition: width 0.3s; }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            #status-bar { top: 10px; left: 10px; padding: 6px; font-size: 11px; min-width: 100px; border-width: 2px; }
            #status-hp-bar, #status-mp-bar { height: 12px; }
            #gui { 
                top: 10px; right: 10px; left: auto; width: 130px; padding: 8px; border-width: 3px; font-size: 9px; 
            }
            #clock-text { font-size: 14px; }
            #weather-info { font-size: 10px; margin-bottom: 8px; }
            #debug-update-btn { padding: 4px; font-size: 8px; }
            
            #bag-gui { 
                bottom: 10px; left: 50%; transform: translateX(-50%); width: 95%; justify-content: center; gap: 4px; 
            }
            #bag-btn, #player-btn, #quest-btn, #prep-btn, #story-btn {
                padding: 12px 5px; font-size: 11px; flex: 1; text-align: center; border-width: 3px;
            }
            
            #inventory-window, #player-window, #quest-window { 
                bottom: 70px; left: 5% !important; width: 90% !important; max-height: 60vh; overflow-y: auto; z-index: 1200;
                touch-action: auto;
            }
            
            #battle-status-window { 
                top: 10px; left: 5%; width: 90%; bottom: auto; padding: 8px;
            }
            #battle-command-window { 
                bottom: 10px; left: 5%; width: 90%; right: auto; padding: 8px;
            }
            #battle-log { font-size: 12px; min-height: 36px; }
            .battle-btn { padding: 12px 4px; font-size: 12px; }
            
            #message-window { 
                bottom: 80px; width: 85%; font-size: 12px; padding: 10px;
            }
        }
    </style>
</head>
<body>

<div id="status-bar">
    <div id="status-lv">Lv 1</div>
    <div id="status-hp-bar"><div id="status-hp-fill"></div><div id="status-hp-text">HP 30/30</div></div>
    <div id="status-mp-bar"><div id="status-mp-fill"></div><div id="status-mp-text">MP 10/10</div></div>
</div>

<div id="gui">
    <span id="clock-text">00:00</span>
    <div id="weather-info">LOADING...</div>
    <button id="debug-update-btn" onclick="manualUpdate()">更新(デバッグ)</button>
    <button id="debug-update-btn" style="font-size:8px; margin-top:4px;" onclick="setManualPos()">位置を手入力する</button>
    <button id="debug-update-btn" style="font-size:8px; margin-top:4px;" onclick="retryGps()">GPS再取得</button>
    <div id="debug-log" style="font-size:8px; color:#0f0; margin-top:4px; text-align:left; border-top:1px solid #555;">Log: Wait GPS</div>
</div>

<div id="bag-gui">
    <div id="inventory-window">
        <div style="border-bottom: 2px solid #fff; margin-bottom: 10px; padding-bottom: 5px;">どうぐ</div>
        <div id="item-list">なし</div>
    </div>
    <div id="player-window">
        <div>ゆうしゃ じょうほう</div>
        <div id="player-info"></div>
        <div id="player-items"></div>
        <div style="display: flex; gap: 4px; margin-top: 8px;">
            <button class="save-btn" onclick="saveGame()">セーブ</button>
            <button class="save-btn" onclick="changeJob()">転職</button>
            <button class="save-btn" onclick="setHome()">自宅設定</button>
        </div>
    </div>
    <div id="quest-window">
        <div>クエスト</div>
        <div id="quest-list"></div>
    </div>
    <button id="bag-btn" onclick="toggleBag()">ふくろ</button>
    <button id="prep-btn" onclick="openPrepMenu()">じゅんび</button>
    <button id="story-btn" onclick="openStoryMenu()">ストーリー</button>
    <button id="quest-btn" onclick="toggleQuestWindow()">クエスト</button>
</div>

<div id="prep-overlay" class="game-overlay">
    <div class="overlay-panel">
        <div class="overlay-title">じゅんび</div>
        <div class="overlay-tabs">
            <button class="overlay-tab active" data-prep-tab="status" onclick="switchPrepTab('status')">ステータス</button>
            <button class="overlay-tab" data-prep-tab="equip" onclick="switchPrepTab('equip')">そうび</button>
            <button class="overlay-tab" data-prep-tab="heart" onclick="switchPrepTab('heart')">こころ</button>
            <button class="overlay-tab" data-prep-tab="job" onclick="switchPrepTab('job')">転職</button>
        </div>
        <div class="overlay-body" id="prep-body"></div>
        <button class="overlay-close" onclick="closePrepMenu()">とじる</button>
    </div>
</div>

<div id="story-overlay" class="game-overlay">
    <div class="overlay-panel">
        <div class="overlay-title">ストーリー</div>
        <div class="overlay-body" id="story-body"></div>
        <button class="overlay-close" onclick="closeStoryMenu()">とじる</button>
    </div>
</div>

<div id="message-window"></div>

<div id="map-loading">
    <div class="load-window">
        <div class="load-text">ちず よみこみちゅう...</div>
        <div class="small-load-bar"><div class="small-load-fill"></div></div>
        <button onclick="document.getElementById('map-loading').classList.remove('visible')" style="margin-top:15px; background:#444; color:#fff; border:1px solid #fff; font-size:10px;">とじる(強制)</button>
    </div>
</div>

<div id="battle-status-window" class="battle-window">
    <div id="battle-title">たたかい</div>
    <div class="battle-hp">
        <div id="battle-player-hp">ゆうしゃ Lv1 HP: 24/24</div>
        <div id="battle-enemy-hp">まもの Lv1 HP: 16/16</div>
    </div>
    <div id="battle-log">まものが あらわれた！</div>
</div>

<div id="battle-command-window" class="battle-window">
    <div class="battle-actions">
        <button class="battle-btn" id="battle-attack-btn">たたかう</button>
        <button class="battle-btn" id="battle-skill-btn">スキル</button>
        <button class="battle-btn" id="battle-run-btn">にげる</button>
        <button class="battle-btn" id="battle-guard-btn">ぼうぎょ</button>
        <button class="battle-btn" id="battle-item-btn">どうぐ</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, roadLayer, mapLayer, slimeGroup;
    let baseCoords = null, lastFetchedCoords = null;
    let keyState = {};
    let isFetching = false;
    let spots = [], monsters = [];
    const ripples = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const inventory = [];
    const ITEM_POOL = ["やくそう", "どうのつるぎ", "かわのたて", "どくけしそう", "スライムゼリー", "スライムコイン"];
    const ITEM_DEFS = {
        "やくそう": { type: "consumable", heal: 15 },
        "どくけしそう": { type: "consumable", heal: 8 },
        "まほうのせいすい": { type: "consumable", mpHeal: 10 },
        "スライムゼリー": { type: "consumable", heal: 8 },
        "どうのつるぎ": { type: "weapon", atk: 4 },
        "はがねのつるぎ": { type: "weapon", atk: 12 },
        "かわのたて": { type: "shield", def: 3 },
        "シルバートレイ": { type: "shield", def: 8 },
        "スライムのこころ": { type: "heart", atk: 1, def: 1, hp: 5, cost: 2 },
        "ドラキーのこころ": { type: "heart", atk: 3, def: 1, hp: 8, cost: 4 },
        "おおがらすのこころ": { type: "heart", atk: 4, def: 2, hp: 12, cost: 6 },
        "ゴーレムのこころ": { type: "heart", atk: 12, def: 8, hp: 30, cost: 18 },
        "キングスライムのこころ": { type: "heart", atk: 15, def: 10, hp: 40, cost: 25 },
        "スライムコイン": { type: "misc" }
    };
    const JOB_DEFS = {
        "戦士": { hp: 1.2, mp: 0.8, atk: 1.2, def: 1.2, skill: "ぶんまわし", skillDmg: 1.3, mpCost: 3 },
        "僧侶": { hp: 1.0, mp: 1.5, atk: 0.8, def: 1.0, skill: "ホイミ", heal: 25, mpCost: 4 },
        "魔法使い": { hp: 0.7, mp: 1.8, atk: 0.7, def: 0.7, skill: "メラゾーマ", skillDmg: 2.2, mpCost: 6 },
        "武闘家": { hp: 1.1, mp: 0.9, atk: 1.3, def: 0.9, skill: "せいけんづき", skillDmg: 1.6, mpCost: 4 }
    };
    const ENEMY_TYPES = [
        { name: "スライム", baseHp: 12, baseAtk: 4, baseDef: 2, exp: 5, drops: ["やくそう", "スライムゼリー", "スライムのこころ"] },
        { name: "ドラキー", baseHp: 16, baseAtk: 6, baseDef: 3, exp: 8, drops: ["やくそう", "どくけしそう", "ドラキーのこころ"] },
        { name: "おおがらす", baseHp: 20, baseAtk: 8, baseDef: 4, exp: 12, drops: ["やくそう", "どうのつるぎ", "おおがらすのこころ"] }
    ];
    const MEGA_MONSTER_TYPES = [
        { name: "ゴーレム", baseHp: 250, baseAtk: 24, baseDef: 15, exp: 150, drops: ["はがねのつるぎ", "ゴーレムのこころ"], scale: 3.5 },
        { name: "キングスライム", baseHp: 400, baseAtk: 30, baseDef: 20, exp: 300, drops: ["シルバートレイ", "キングスライムのこころ"], scale: 4.5 }
    ];
    const LV_UP_TABLE = { hp: 6, mp: 2, atk: 3, def: 2, cost: 2 };
    const QUEST_MASTER = [
        { id: "walk_500", name: "日課：500mあるく", type: "walk", target: 500, rewardGold: 100, rewardItem: "やくそう" },
        { id: "battle_5", name: "日課：まもの5体討伐", type: "battle", target: 5, rewardGold: 150, rewardItem: "まほうのせいすい" },
        { id: "pickup_3", name: "日課：素材を3回拾う", type: "pickup", target: 3, rewardGold: 120, rewardItem: "スライムコイン" }
    ];
    const TUTORIAL_CHAPTERS = [
        { id: 0, key: "start", text: "ようこそ、散歩の世界へ。\nWキーで すすもう。" },
        { id: 1, key: "walk50", needWalk: 50, text: "よく歩いた！\nこの先に まものが うようよしている。" },
        { id: 2, key: "win1", needWins: 1, text: "たたかいの かんじ、つかめたな。\n『じゅんび』で そうびを かえられる。" },
        { id: 3, key: "setgoal", needGoalSet: true, text: "もくてきちを おぼえた。\nそこに ついたら 物語が ひらける。" },
        { id: 4, key: "reach", needGoalReach: true, text: "目的地に ついた！\nきみの 足どりが 新しい 一章を うむ。" }
    ];
    let storyState = { tutorialDone: {}, goals: [], battleWins: 0, goalSetCount: 0, goalReachCount: 0 };
    let prepTab = "status";
    let isInBattle = false;
    let currentBattleMonster = null;
    const playerState = { 
        job: "戦士",
        lv: 1, 
        exp: 0, 
        nextExp: 20, 
        maxHp: 30, 
        hp: 30, 
        maxMp: 10, 
        mp: 10, 
        atk: 12, 
        def: 6, 
        gold: 100, 
        maxCost: 10,
        equipment: { weapon: null, shield: null, heart: null },
        homeSet: false,
        homeCoords: null
    };
    const battleState = {
        enemy: null,
        playerTurn: true,
        busy: false,
        guardRate: 1.0,
        cameraBackup: null,
        center: null,
        animation: null
    };
    const buildingOutlineLines = [];
    const BUILDING_OUTLINE_HIDE_DISTANCE = 420;
    let lastFrameAt = performance.now();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let buildingOutlineVisible = true;
    let walkedDistance = 0;
    let questProgress = {};
    let questDone = {};
    const defeatEffects = [];
    let homeSpotGroup = null;

    const R = 6378137;
    const MAP_RADIUS = 560; 
    const AUTO_UPDATE_THRESHOLD = 300;
    const CAMERA_DIST = 58;
    const DEFAULT_FALLBACK = { lat: 38.2601, lon: 140.8824 };
    let gpsWatchId = null;
    let gpsResolved = false;
    let gpsRetryStage = 0;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 1, 2600);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        roadLayer = new THREE.Group(); scene.add(roadLayer);
        mapLayer = new THREE.Group(); scene.add(mapLayer);

        // Ground
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        for(let y=0; y<4; y++){
            for(let x=0; x<4; x++){
                const g = 70 + Math.floor(Math.random() * 50);
                ctx.fillStyle = `rgb(40, ${g}, 35)`;
                ctx.fillRect(x*64, y*64, 64, 64);
            }
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(500, 500);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30000, 30000), new THREE.MeshLambertMaterial({ map: texture }));
        ground.rotation.x = -Math.PI / 2; scene.add(ground);

        // Slime Player
        slimeGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(3, 24, 24), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        body.scale.set(1.1, 0.85, 1.1);
        const horn = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 16), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        horn.position.y = 1.5; slimeGroup.add(body); slimeGroup.add(horn);
        const ring = new THREE.Mesh(new THREE.RingGeometry(10.8, 11, 32), new THREE.MeshBasicMaterial({ color: 0x0000FF, side: THREE.DoubleSide }));
        ring.rotation.x = Math.PI / 2; ring.position.y = -2.8; slimeGroup.add(ring);
        slimeGroup.position.set(0, 3, 0); scene.add(slimeGroup);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2.35;
        controls.minDistance = CAMERA_DIST - 8; controls.maxDistance = CAMERA_DIST + 4;
        controls.target.copy(slimeGroup.position);
        camera.position.set(0, 47, 60);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.4); sunLight.position.set(50, 200, 100); scene.add(sunLight);

        loadGame();
        initQuestState();
        applyLoginBonus();
        updateRealTime();
        startTracking();
        
        window.addEventListener('keydown', (e) => keyState[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keyState[e.key.toLowerCase()] = false);
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('beforeunload', () => saveGame(true));
        
        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersectPoint)) {
                createRipple(intersectPoint);
            }
        });

        setupBattleUI();
        updatePlayerWindow();
        updateQuestWindow();
        updateInventoryUI();
        addLog("Init Done");
        setTimeout(() => {
            if (!storyState.tutorialDone.start) showTutorialChapter(TUTORIAL_CHAPTERS[0]);
        }, 1200);
        animate();
    }

    function buildBatchedRoadMesh(segments, maxWays = 130, halfWidth = 5.8) {
        const allPos = [];
        const allIdx = [];
        let vOff = 0;
        const sorted = segments.slice().sort((a, b) => b.length - a.length).slice(0, maxWays);
        for (const pts of sorted) {
            if (pts.length < 2) continue;
            const segLeft = [];
            const segRight = [];
            for (let i = 0; i < pts.length; i++) {
                const prev = pts[Math.max(0, i - 1)];
                const next = pts[Math.min(pts.length - 1, i + 1)];
                const dir = new THREE.Vector2(next.x - prev.x, next.y - prev.y);
                if (dir.lengthSq() < 0.0001) continue;
                dir.normalize();
                const n = new THREE.Vector2(-dir.y, dir.x).multiplyScalar(halfWidth);
                segLeft.push(pts[i].x + n.x, 0.245, pts[i].y + n.y);
                segRight.push(pts[i].x - n.x, 0.245, pts[i].y - n.y);
            }
            const count = segLeft.length / 3;
            if (count < 2) continue;
            for (let i = 0; i < count - 1; i++) {
                const a = vOff + i * 2;
                allIdx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2);
            }
            for (let i = 0; i < count; i++) {
                allPos.push(segLeft[i * 3], segLeft[i * 3 + 1], segLeft[i * 3 + 2]);
                allPos.push(segRight[i * 3], segRight[i * 3 + 1], segRight[i * 3 + 2]);
            }
            vOff += count * 2;
        }
        if (!allPos.length) return null;
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.Float32BufferAttribute(allPos, 3));
        geom.setIndex(allIdx);
        const mat = new THREE.MeshLambertMaterial({
            color: 0x707a88,
            emissive: 0x1a2230,
            emissiveIntensity: 0.35,
            polygonOffset: true,
            polygonOffsetFactor: -1,
            polygonOffsetUnits: -1
        });
        return new THREE.Mesh(geom, mat);
    }

    async function fetchMapData(lat, lon) {
        if (isFetching) return;
        if (!baseCoords) {
            addLog("Err: No BaseCoords");
            document.getElementById('map-loading').classList.remove('visible');
            return;
        }
        isFetching = true;
        lastFetchedCoords = { lat, lon };
        addLog(`Fetch: ${lat.toFixed(4)},${lon.toFixed(4)}`);
        document.getElementById('map-loading').classList.add('visible');
        
        const q = `[out:json][timeout:20];(way["highway"](around:${MAP_RADIUS},${lat},${lon});way["building"](around:${MAP_RADIUS},${lat},${lon}););out geom;`;
        
        let data = null;
        let success = false;

        try {
            addLog(`Try: /api/overpass`);
            const res = await fetch(`/api/overpass?data=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error("Status " + res.status);
            data = await res.json();
            if (data.error) throw new Error(data.error);
            success = true;
        } catch (e) {
            addLog(`Fail: Proxy (${e.message})`);
        }

        try {
            if (!success) throw new Error("Proxy fetch failed");
            
            if (!data || !data.elements) {
                addLog("Warn: No Data Found");
                data = { elements: [] };
            } else {
                addLog(`Got ${data.elements.length} items`);
            }
            roadLayer.clear(); mapLayer.clear();
            buildingOutlineLines.length = 0;
            const roadSegments = [];
            const buildingFillMaterial = new THREE.MeshLambertMaterial({
                color: 0x5b6672,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.88,
                polygonOffset: true,
                polygonOffsetFactor: -1,
                polygonOffsetUnits: -2
            });
            const buildingLineMaterial = new THREE.LineBasicMaterial({ color: 0xbfc6cf });
            buildingOutlineLines.length = 0;

            data.elements.forEach(el => {
                if (!el.geometry || !el.tags) return;

                const pts2D = el.geometry.map(p => {
                    const dx = (p.lon - baseCoords.lon) * ((Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180);
                    const dz = -(p.lat - baseCoords.lat) * ((2 * Math.PI * R) / 360);
                    return new THREE.Vector2(dx, dz);
                });

                if (el.tags.building) {
                    if (pts2D.length < 3) return;
                    const shape = new THREE.Shape(pts2D);
                    const buildingGeom = new THREE.ShapeGeometry(shape);
                    const buildingMesh = new THREE.Mesh(buildingGeom, buildingFillMaterial);
                    buildingMesh.rotation.x = Math.PI / 2;
                    buildingMesh.position.y = 0.26;
                    mapLayer.add(buildingMesh);

                    const outlinePts = [...pts2D, pts2D[0]];
                    const lineGeom = new THREE.BufferGeometry().setFromPoints(
                        outlinePts.map(p => new THREE.Vector3(p.x, 0.28, p.y))
                    );
                    const line = new THREE.Line(lineGeom, buildingLineMaterial);
                    const centerX = pts2D.reduce((sum, p) => sum + p.x, 0) / pts2D.length;
                    const centerZ = pts2D.reduce((sum, p) => sum + p.y, 0) / pts2D.length;
                    line.userData.center = { x: centerX, z: centerZ };
                    mapLayer.add(line);
                    buildingOutlineLines.push(line);

                } else if (el.tags.highway) {
                    if (pts2D.length < 2) return;
                    roadSegments.push(pts2D);
                }
            });
            const mergedRoads = buildBatchedRoadMesh(roadSegments);
            if (mergedRoads) roadLayer.add(mergedRoads);
            if (spots.length === 0 && monsters.length === 0) createObjects();
            else if (playerState.homeCoords) createHomeMarker();
        } catch (e) { 
            addLog("API Error: " + e.message);
            showMessage("ちずの よみこみに しっぱい"); 
        } finally {
            isFetching = false;
            setTimeout(() => document.getElementById('map-loading').classList.remove('visible'), 500);
        }
    }

    function createHomeMarker() {
        if (homeSpotGroup) {
            scene.remove(homeSpotGroup);
            homeSpotGroup = null;
        }
        if (!playerState.homeCoords || !baseCoords) return;
        const hx = (playerState.homeCoords.lon - baseCoords.lon) * ((Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180);
        const hz = -(playerState.homeCoords.lat - baseCoords.lat) * ((2 * Math.PI * R) / 360);
        homeSpotGroup = new THREE.Group();
        homeSpotGroup.position.set(hx, 0, hz);
        const house = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), new THREE.MeshPhongMaterial({ color: 0xffaa00 }));
        house.position.y = 3; homeSpotGroup.add(house);
        const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 5, 4), new THREE.MeshPhongMaterial({ color: 0xaa0000 }));
        roof.position.y = 8.5; roof.rotation.y = Math.PI / 4; homeSpotGroup.add(roof);
        const sign = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 0.5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sign.position.set(0, 10, 5); homeSpotGroup.add(sign);
        scene.add(homeSpotGroup);
        const existing = spots.find(s => s.type === "home");
        if (existing) {
            existing.group = homeSpotGroup;
            existing.active = true;
        } else {
            spots.push({ group: homeSpotGroup, type: "home", active: true });
        }
    }

    function createObjects() {
        spots.forEach(s => { if (s.type !== "home") scene.remove(s.group); });
        monsters.forEach(m => scene.remove(m.group));
        spots = spots.filter(s => s.type === "home");
        monsters = [];
        createHomeMarker();

        for(let i=0; i<18; i++){
            const rx = (Math.random()-0.5)*1400 + slimeGroup.position.x;
            const rz = (Math.random()-0.5)*1400 + slimeGroup.position.z;
            const group = new THREE.Group();
            group.position.set(rx, 0, rz);
            
            const roll = Math.random();
            if(roll > 0.6) {
                // 回復スポット or アイテム
                const isRecovery = Math.random() > 0.5;
                const color = isRecovery ? 0x00ffff : 0x00ff00;
                const p = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 18, 8), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 }));
                p.position.y = 9; group.add(p); scene.add(group);
                spots.push({ group, type: isRecovery ? "recovery" : "item", active: true });
            } else {
                // 通常モンスター or メガモンスター（低確率ボス）
                const isMega = Math.random() > 0.94;
                const enemyType = isMega ? MEGA_MONSTER_TYPES[Math.floor(Math.random() * MEGA_MONSTER_TYPES.length)] : ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
                const enemyLv = isMega ? 10 : (1 + Math.floor(Math.random() * Math.max(1, playerState.lv + 1)));
                const scale = enemyType.scale || 1.0;
                
                const enemyStats = {
                    name: (isMega ? "[MEGA] " : "") + enemyType.name,
                    lv: enemyLv,
                    maxHp: enemyType.baseHp + enemyLv * 5,
                    hp: enemyType.baseHp + enemyLv * 5,
                    atk: enemyType.baseAtk + enemyLv * 3,
                    def: enemyType.baseDef + enemyLv * 2,
                    exp: enemyType.exp + enemyLv * 5,
                    drops: enemyType.drops,
                    isMega: isMega
                };
                
                const b = new THREE.Mesh(new THREE.SphereGeometry(3 * scale, 16, 16), new THREE.MeshPhongMaterial({ color: isMega ? 0x8800ff : 0xff4444 }));
                b.position.y = 3 * scale; group.add(b);
                const mark = createEmoteMark();
                mark.position.y = 12 * scale; mark.visible = isMega;
                group.add(mark);
                scene.add(group);
                monsters.push({ group, mark, active: true, velocity: new THREE.Vector3(0,0,0), nextMoveTime: 0, stats: enemyStats });
            }
        }
    }

    function createEmoteMark() {
        const group = new THREE.Group();
        const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        const dot = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        dot.position.y = -3; group.add(top); group.add(dot);
        return group;
    }

    function handleInteraction() {
        spots.forEach(s => {
            if (s.active && slimeGroup.position.distanceTo(s.group.position) < 11) {
                if (s.type === "recovery") {
                    s.active = false;
                    const pStats = getPlayerBattleStats();
                    playerState.hp = pStats.maxHp;
                    playerState.mp = pStats.maxMp;
                    showMessage("HP・MPが まんたんに なった！");
                    scene.remove(s.group);
                } else if (s.type === "item") {
                    s.active = false;
                    const item = ITEM_POOL[Math.floor(Math.random() * ITEM_POOL.length)];
                    inventory.push(item);
                    updateInventoryUI();
                    addQuestProgress("pickup", 1);
                    showMessage(`${item}を みつけた！`);
                    scene.remove(s.group);
                } else if (s.type === "home") {
                    const pStats = getPlayerBattleStats();
                    if (playerState.hp < pStats.maxHp || playerState.mp < pStats.maxMp) {
                        playerState.hp = pStats.maxHp;
                        playerState.mp = pStats.maxMp;
                        showMessage("自宅で やすんで HP・MP全回復！");
                    }
                }
            }
        });
        monsters.forEach(m => {
            if (m.active && slimeGroup.position.distanceTo(m.group.position) < 11) {
                beginBattle(m);
            }
        });
    }

    function initQuestState() {
        QUEST_MASTER.forEach(q => {
            if (questProgress[q.id] == null) questProgress[q.id] = 0;
            if (questDone[q.id] == null) questDone[q.id] = false;
        });
    }

    function addQuestProgress(type, amount) {
        let anyComplete = false;
        for (const q of QUEST_MASTER) {
            if (q.type !== type || questDone[q.id]) continue;
            questProgress[q.id] += amount;
            if (questProgress[q.id] >= q.target) {
                questDone[q.id] = true;
                playerState.gold += q.rewardGold;
                if (q.rewardItem) inventory.push(q.rewardItem);
                showMessage(`クエスト達成: ${q.name}\n${q.rewardGold}G かくとく`);
                anyComplete = true;
            }
        }
        if (anyComplete) updateInventoryUI();
        updateQuestWindow();
    }

    function toggleQuestWindow() {
        const win = document.getElementById('quest-window');
        const visible = win.style.display === 'block';
        win.style.display = visible ? 'none' : 'block';
        if (!visible) updateQuestWindow();
    }

    function updateQuestWindow() {
        const el = document.getElementById('quest-list');
        const today = new Date().toLocaleDateString("ja-JP");
        const rows = [`<div style="color:#ff9;margin-bottom:8px;">今日: ${today}</div>`];
        QUEST_MASTER.forEach(q => {
            const progress = Math.min(q.target, questProgress[q.id] || 0);
            const done = questDone[q.id];
            const state = done ? "達成" : `${Math.floor(progress)}/${q.target}`;
            rows.push(`<div style="margin-bottom:8px;">${q.name}<br><span style="color:${done ? "#7fffa5" : "#ddd"}">${state}</span></div>`);
        });
        el.innerHTML = rows.join("");
    }

    function saveGame(silent = false) {
        const payload = {
            playerState,
            inventory,
            questProgress,
            questDone,
            walkedDistance,
            storyState
        };
        localStorage.setItem("dqw_like_save", JSON.stringify(payload));
        if (!silent) showMessage("セーブしました");
    }

    function loadGame() {
        const raw = localStorage.getItem("dqw_like_save");
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            if (data.playerState) Object.assign(playerState, data.playerState);
            if (Array.isArray(data.inventory)) {
                inventory.length = 0;
                data.inventory.forEach(i => inventory.push(i));
            }
            if (data.questProgress) questProgress = data.questProgress;
            if (data.questDone) questDone = data.questDone;
            if (typeof data.walkedDistance === "number") walkedDistance = data.walkedDistance;
            if (data.storyState) storyState = { ...storyState, ...data.storyState };
        } catch (e) {
            // ignore broken save
        }
    }

    function applyLoginBonus() {
        const today = new Date().toISOString().slice(0, 10);
        const last = localStorage.getItem("dqw_login_last");
        if (last === today) return;
        
        // 日付が変わったらクエストリセット
        QUEST_MASTER.forEach(q => {
            questProgress[q.id] = 0;
            questDone[q.id] = false;
        });
        
        localStorage.setItem("dqw_login_last", today);
        playerState.gold += 100;
        inventory.push("やくそう");
        showMessage("日替わりボーナス: 100G と やくそう\nクエストを更新しました");
    }

    function setHome() {
        if (!lastFetchedCoords) {
            showMessage("位置情報がありません");
            return;
        }
        playerState.homeCoords = { ...lastFetchedCoords };
        playerState.homeSet = true;
        createHomeMarker();
        showMessage("ここを 自宅に設定しました！\n近づくと HP・MP回復");

    }

    function changeJob() {
        const jobs = Object.keys(JOB_DEFS);

        const nextIndex = (currentIndex + 1) % jobs.length;
        playerState.job = jobs[nextIndex];
        showMessage(`職業を ${playerState.job} に変更した！`);

        renderPrepBody();

    function equipItemAt(idx) {
        const item = inventory[idx];
        if (!item) return;
        const def = ITEM_DEFS[item] || { type: "misc" };
        if (def.type === "heart") {
            if (def.cost > playerState.maxCost) {
                showMessage(`コスト不足！(必要:${def.cost}/最大:${playerState.maxCost})`);
                return;
            }
            if (playerState.equipment.heart) inventory.push(playerState.equipment.heart);
            playerState.equipment.heart = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "weapon") {
            if (playerState.equipment.weapon) inventory.push(playerState.equipment.weapon);
            playerState.equipment.weapon = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "shield") {
            if (playerState.equipment.shield) inventory.push(playerState.equipment.shield);
            playerState.equipment.shield = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "consumable") {
            const pStats = getPlayerBattleStats();
            if (def.heal) playerState.hp = Math.min(pStats.maxHp, playerState.hp + def.heal);
            if (def.mpHeal) playerState.mp = Math.min(pStats.maxMp, playerState.mp + def.mpHeal);
            inventory.splice(idx, 1);
            showMessage(`${item}を つかった`);
        }
        playerState.hp = Math.min(playerState.hp, getPlayerBattleStats().maxHp);
        playerState.mp = Math.min(playerState.mp, getPlayerBattleStats().maxMp);
        updateInventoryUI();
        updatePlayerWindow();
        renderPrepBody();
    }

    function renderPrepBody() {
        const el = document.getElementById('prep-body');
        const bonus = getEquippedBonus();
        const pStats = getPlayerBattleStats();
        const job = JOB_DEFS[playerState.job] || JOB_DEFS["戦士"];

        if (prepTab === "status") {
            el.innerHTML = [
                `<span style="color:#ff9">職業: ${playerState.job}</span>`,
                `Lv ${playerState.lv}  EXP ${playerState.exp}/${playerState.nextExp}`,
                `HP ${playerState.hp}/${pStats.maxHp}  MP ${playerState.mp}/${pStats.maxMp}`,
                `GOLD ${playerState.gold}`,
                `こうげき ${pStats.atk}  しゅび ${pStats.def}`,
                `こころコスト ${bonus.cost}/${playerState.maxCost}`,
                `歩行 ${Math.floor(walkedDistance)}m`,
                `戦闘勝利 ${storyState.battleWins}回`
            ].join("<br>");
            return;
        }

        if (prepTab === "equip") {
            const rows = inventory.map((item, idx) => {
                const def = ITEM_DEFS[item] || {};
                if (def.type !== "weapon" && def.type !== "shield") return "";
                return `<div class="prep-equip-row"><span>${item}</span><button class="overlay-action" onclick="equipItemAt(${idx})">そうび</button></div>`;
            }).filter(Boolean).join("") || "装備できるどうぐが ない";
            el.innerHTML = `<div>ぶき: ${playerState.equipment.weapon || "なし"}</div><div>たて: ${playerState.equipment.shield || "なし"}</div><hr style="border-color:#444">${rows}`;
            return;
        }

        if (prepTab === "heart") {
            const rows = inventory.map((item, idx) => {
                const def = ITEM_DEFS[item] || {};
                if (def.type !== "heart") return "";
                return `<div class="prep-equip-row"><span>${item} (コスト${def.cost})</span><button class="overlay-action" onclick="equipItemAt(${idx})">そうび</button></div>`;
            }).filter(Boolean).join("") || "こころを もっていない";
            el.innerHTML = `<div>そうび中: ${playerState.equipment.heart || "なし"}</div><hr style="border-color:#444">${rows}`;
            return;
        }

        if (prepTab === "job") {
            const jobs = Object.keys(JOB_DEFS);
            el.innerHTML = jobs.map(j => {
                const d = JOB_DEFS[j];
                const cur = j === playerState.job ? " ← いま" : "";
                return `<div style="margin-bottom:10px;"><b>${j}</b>${cur}<br>スキル: ${d.skill} (MP${d.mpCost})</div>`;
            }).join("") + `<button class="overlay-action" onclick="changeJob()">つぎの職業へ 転職</button>`;
        }
    }

    function renderStoryBody() {

            const done = storyState.tutorialDone[ch.key];
            return `<div style="color:${done ? '#7f7' : '#aaa'};margin-bottom:4px;">${done ? "✓" : "・"} 章${ch.id}</div>`;
        }).join("");

        const goalCards = storyState.goals.map((g, i) => {
            const st = g.reached ? "達成" : "未達";
            return `<div class="story-goal-card ${g.reached ? 'done' : ''}"><b>${g.title}</b> [${st}]<br><span style="color:#ccc;font-size:10px;">${g.text.slice(0, 40)}...</span></div>`;
        }).join("") || "<div style='color:#888'>目的地は まだない</div>";

        el.innerHTML = `
            <div style="margin-bottom:12px;color:#ff9;">チュートリアル進行</div>${tutLines}
            <div style="margin:14px 0 8px;border-top:2px solid #444;padding-top:8px;color:#ff9;">あなたの物語・目的地</div>
            ${goalCards}
            <div id="story-goal-form" style="margin-top:12px;border-top:2px solid #444;padding-top:8px;">
                <input id="story-title" placeholder="目的地の名前（例: かえりみちの公園）" />
                <textarea id="story-text" placeholder="到着時に表示する物語（ひと言でもOK）"></textarea>
                <button class="overlay-action" onclick="addStoryGoalFromCurrent()">いまの場所を 目的地にする</button>
            </div>`;
    }

    function addStoryGoalFromCurrent() {
        if (!baseCoords || !lastFetchedCoords) {
            showMessage("位置が まだ取得できていません");
            return;
        }
        const title = document.getElementById('story-title')?.value?.trim() || "目的地";
        const text = document.getElementById('story-text')?.value?.trim() || `${title}に たどりついた。`;
        const latScale = (2 * Math.PI * R) / 360;
        const lonScale = (Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180;
        const lat = baseCoords.lat - (slimeGroup.position.z / latScale);
        const lon = baseCoords.lon + (slimeGroup.position.x / lonScale);
        storyState.goals.push({ id: "g" + Date.now(), title, text, lat, lon, reached: false });
        storyState.goalSetCount += 1;
        checkTutorialProgress();
        saveGame(true);
        showMessage(`「${title}」を 目的地に設定した！`);
        renderStoryBody();
    }

    function showTutorialChapter(ch) {
        if (storyState.tutorialDone[ch.key]) return;
        storyState.tutorialDone[ch.key] = true;
        showMessage(ch.text);
        saveGame(true);
    }

    function checkTutorialProgress() {
        TUTORIAL_CHAPTERS.forEach(ch => {
            if (storyState.tutorialDone[ch.key]) return;
            if (ch.key === "start") return;
            if (ch.needWalk && walkedDistance >= ch.needWalk) showTutorialChapter(ch);
            if (ch.needWins && storyState.battleWins >= ch.needWins) showTutorialChapter(ch);
            if (ch.needGoalSet && storyState.goalSetCount >= 1) showTutorialChapter(ch);
            if (ch.needGoalReach && storyState.goalReachCount >= 1) showTutorialChapter(ch);
        });
    }

    function checkStoryArrival() {
        if (!baseCoords || isInBattle) return;
        const latScale = (2 * Math.PI * R) / 360;
        const lonScale = (Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180;
        const playerLat = baseCoords.lat - (slimeGroup.position.z / latScale);
        const playerLon = baseCoords.lon + (slimeGroup.position.x / lonScale);
        let anyNew = false;
        storyState.goals.forEach(g => {
            if (g.reached) return;
            const dLat = (playerLat - g.lat) * latScale;
            const dLon = (playerLon - g.lon) * lonScale;
            const dist = Math.sqrt(dLat * dLat + dLon * dLon);
            if (dist < 45) {
                g.reached = true;
                storyState.goalReachCount += 1;
                anyNew = true;
                showMessage(`【${g.title}】\n\n${g.text}`);
            }
        });
        if (anyNew) {
            checkTutorialProgress();
            saveGame(true);
        }
    }

    function getEquippedBonus() {
        const weapon = playerState.equipment.weapon ? ITEM_DEFS[playerState.equipment.weapon] : null;
        const shield = playerState.equipment.shield ? ITEM_DEFS[playerState.equipment.shield] : null;
        const heart = playerState.equipment.heart ? ITEM_DEFS[playerState.equipment.heart] : null;
        return {
            atk: (weapon?.atk || 0) + (heart?.atk || 0),
            def: (shield?.def || 0) + (heart?.def || 0),
            hp: (heart?.hp || 0),
            cost: (heart?.cost || 0)
        };
    }

    function getPlayerBattleStats() {
        const bonus = getEquippedBonus();
        const job = JOB_DEFS[playerState.job] || JOB_DEFS["戦士"];
        return {
            atk: Math.floor((playerState.atk + bonus.atk) * job.atk),
            def: Math.floor((playerState.def + bonus.def) * job.def),
            maxHp: Math.floor((playerState.maxHp + bonus.hp) * job.hp),
            maxMp: Math.floor(playerState.maxMp * job.mp)
        };
    }

    function togglePlayerWindow() {
        const win = document.getElementById('player-window');
        const visible = win.style.display === 'block';
        win.style.display = visible ? 'none' : 'block';
        if (!visible) updatePlayerWindow();
    }

    function updateStatusBar() {
        try {
            const pStats = getPlayerBattleStats();
            const lvEl = document.getElementById('status-lv');
            const hpT = document.getElementById('status-hp-text');
            const mpT = document.getElementById('status-mp-text');
            const hpF = document.getElementById('status-hp-fill');
            const mpF = document.getElementById('status-mp-fill');
            
            if (lvEl) lvEl.textContent = `Lv ${playerState.lv} ${playerState.job}`;
            if (hpT) hpT.textContent = `HP ${Math.max(0, playerState.hp)}/${pStats.maxHp}`;
            if (mpT) mpT.textContent = `MP ${playerState.mp}/${pStats.maxMp}`;
            
            const hpPct = (playerState.hp / pStats.maxHp) * 100;
            const mpPct = (playerState.mp / pStats.maxMp) * 100;
            
            if (hpF) {
                hpF.style.width = `${Math.max(0, Math.min(100, hpPct))}%`;
                hpF.style.background = hpPct < 25 ? '#f00' : '#0f0';
            }
            if (mpF) {
                mpF.style.width = `${Math.max(0, Math.min(100, mpPct))}%`;
            }
        } catch (e) {
            console.error("StatusBar Error:", e);
        }
    }

    function updatePlayerWindow() {
        updateStatusBar();
        const bonus = getEquippedBonus();
        const pStats = getPlayerBattleStats();
        const info = document.getElementById('player-info');
        info.innerHTML = [
            `<span style="color:#ff0">職業: ${playerState.job}</span>`,
            `Lv ${playerState.lv}`,
            `HP ${playerState.hp}/${pStats.maxHp}`,
            `MP ${playerState.mp}/${pStats.maxMp}`,
            `EXP ${playerState.exp}/${playerState.nextExp}`,
            `GOLD ${playerState.gold}`,
            `コスト ${bonus.cost}/${playerState.maxCost}`,
            `歩行 ${Math.floor(walkedDistance)}m`,
            `こうげき ${pStats.atk}`,
            `しゅび ${pStats.def}`,
            `ぶき: ${playerState.equipment.weapon || "なし"}`,
            `たて: ${playerState.equipment.shield || "なし"}`,
            `こころ: ${playerState.equipment.heart || "なし"}`
        ].join("<br>");

        const items = document.getElementById('player-items');
        if (inventory.length === 0) {
            items.innerHTML = "もちもの: なし";
            return;
        }
        const rows = inventory.map((item, idx) => {
            const def = ITEM_DEFS[item] || { type: "misc" };
            const costText = def.type === "heart" ? `(${def.cost})` : "";
            const action = def.type === "weapon" || def.type === "shield" || def.type === "heart" ? "そうび" : (def.type === "consumable" ? "つかう" : "みる");
            return `<div class="item-row"><span>${item}${costText}</span><button class="item-act" data-idx="${idx}">${action}</button></div>`;
        });
        items.innerHTML = rows.join("");
    }

    function onPlayerItemAction(e) {
        const btn = e.target;
        if (!btn.classList.contains('item-act')) return;
        const idx = Number(btn.dataset.idx);
        const item = inventory[idx];
        if (!item) return;
        const def = ITEM_DEFS[item] || { type: "misc" };
        
        if (def.type === "heart") {
            if (def.cost > playerState.maxCost) {
                showMessage(`コスト不足！(必要:${def.cost}/最大:${playerState.maxCost})`);
                return;
            }
            if (playerState.equipment.heart) inventory.push(playerState.equipment.heart);
            playerState.equipment.heart = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "weapon") {
            if (playerState.equipment.weapon) inventory.push(playerState.equipment.weapon);
            playerState.equipment.weapon = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "shield") {
            if (playerState.equipment.shield) inventory.push(playerState.equipment.shield);
            playerState.equipment.shield = item;
            inventory.splice(idx, 1);
            showMessage(`${item}を そうびした`);
        } else if (def.type === "consumable") {
            const pStats = getPlayerBattleStats();
            if (def.heal) playerState.hp = Math.min(pStats.maxHp, playerState.hp + def.heal);
            if (def.mpHeal) playerState.mp = Math.min(pStats.maxMp, playerState.mp + def.mpHeal);
            inventory.splice(idx, 1);
            showMessage(`${item}を つかった`);
        }
        playerState.hp = Math.min(playerState.hp, getPlayerBattleStats().maxHp);
        playerState.mp = Math.min(playerState.mp, getPlayerBattleStats().maxMp);
        updateInventoryUI();
        updatePlayerWindow();
    }

    function setBattleButtonsEnabled(enabled) {
        ["battle-attack-btn", "battle-skill-btn", "battle-run-btn", "battle-guard-btn", "battle-item-btn"].forEach(id => {
            document.getElementById(id).disabled = !enabled;
        });
    }

    function enterBattleCamera(center) {
        battleState.cameraBackup = {
            position: camera.position.clone(),
            target: controls.target.clone(),
            enabled: controls.enabled
        };
        controls.enabled = false;
        battleState.center = center.clone();
        camera.position.set(center.x, center.y + 28, center.z + 40);
        camera.lookAt(center.x, center.y + 4, center.z);
    }

    function leaveBattleCamera() {
        if (!battleState.cameraBackup) return;
        camera.position.copy(battleState.cameraBackup.position);
        controls.target.copy(battleState.cameraBackup.target);
        controls.enabled = battleState.cameraBackup.enabled;
        battleState.cameraBackup = null;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function startBattleMotion(attackerGroup, targetGroup, variant = null) {
        const v = variant || [
            { dashMs: 260, holdMs: 100, backMs: 280, reach: 6.5 },
            { dashMs: 220, holdMs: 150, backMs: 300, reach: 5.8 },
            { dashMs: 300, holdMs: 80, backMs: 240, reach: 7.2 }
        ][Math.floor(Math.random() * 3)];
        const origin = attackerGroup.position.clone();
        const targetFlat = targetGroup.position.clone().sub(attackerGroup.position).setY(0);
        const distance = targetFlat.length();
        const travel = Math.max(3.8, Math.min(v.reach, distance - 2.4));
        const toward = targetFlat.normalize().multiplyScalar(travel);
        battleState.animation = {
            actor: attackerGroup,
            origin,
            dashPos: origin.clone().add(toward),
            phase: "dash",
            startedAt: performance.now(),
            dashMs: v.dashMs,
            holdMs: v.holdMs,
            backMs: v.backMs
        };
        return { hitMs: v.dashMs + Math.floor(v.holdMs * 0.6), totalMs: v.dashMs + v.holdMs + v.backMs };
    }

    function updateBattleMotion(now) {
        const anim = battleState.animation;
        if (!anim) return;
        if (anim.phase === "dash") {
            const t = Math.min(1, (now - anim.startedAt) / anim.dashMs);
            anim.actor.position.lerpVectors(anim.origin, anim.dashPos, t);
            if (t >= 1) {
                anim.phase = "hold";
                anim.startedAt = now;
            }
            return;
        }
        if (anim.phase === "hold") {
            const t = (now - anim.startedAt) / anim.holdMs;
            anim.actor.position.copy(anim.dashPos);
            if (t >= 1) {
                anim.phase = "back";
                anim.startedAt = now;
            }
            return;
        }
        const t = Math.min(1, (now - anim.startedAt) / anim.backMs);
        anim.actor.position.lerpVectors(anim.dashPos, anim.origin, t);
        if (t >= 1) battleState.animation = null;
    }

    function beginBattle(monster) {
        if (isInBattle || !monster.active) return;
        isInBattle = true;
        currentBattleMonster = monster;
        monster.active = false;
        monster.mark.visible = true;

        const center = slimeGroup.position.clone();
        const playerPos = center.clone().add(new THREE.Vector3(-11, 0, 8));
        const enemyPos = center.clone().add(new THREE.Vector3(11, 0, -8));
        slimeGroup.position.copy(playerPos);
        monster.group.position.copy(enemyPos);
        slimeGroup.lookAt(enemyPos);
        monster.group.lookAt(playerPos);
        enterBattleCamera(center);

        battleState.enemy = { ...monster.stats };
        battleState.playerTurn = true;
        battleState.busy = false;
        battleState.guardRate = 1.0;
        const job = JOB_DEFS[playerState.job] || JOB_DEFS["戦士"];
        document.getElementById('battle-skill-btn').textContent = job.skill || "スキル";
        if (battleState.enemy.isMega) {
            showMessage(`メガモンスター ${battleState.enemy.name}\nが あらわれた！！`);
        }
        updateBattleUI(`${battleState.enemy.name} が あらわれた！`);
        setBattleButtonsEnabled(true);
        document.getElementById('battle-status-window').style.display = 'block';
        document.getElementById('battle-command-window').style.display = 'block';
    }

    function updateBattleUI(logText) {
        updateStatusBar();
        const enemy = battleState.enemy || { name: "まもの", lv: 1, hp: 0, maxHp: 0 };
        const pStats = getPlayerBattleStats();
        document.getElementById('battle-player-hp').textContent = `ゆうしゃ Lv${playerState.lv} HP: ${Math.max(0, playerState.hp)}/${pStats.maxHp} MP:${playerState.mp}/${playerState.maxMp}`;
        document.getElementById('battle-enemy-hp').textContent = `${enemy.name} Lv${enemy.lv} HP: ${Math.max(0, enemy.hp)}/${enemy.maxHp}`;
        document.getElementById('battle-log').textContent = logText;
    }

    function grantExp(exp) {
        playerState.exp += exp;
        let lvupCount = 0;
        while (playerState.exp >= playerState.nextExp) {
            playerState.exp -= playerState.nextExp;
            playerState.lv += 1;
            playerState.nextExp = Math.floor(playerState.nextExp * 1.4);
            playerState.maxHp += LV_UP_TABLE.hp;
            playerState.maxMp += LV_UP_TABLE.mp;
            playerState.atk += LV_UP_TABLE.atk;
            playerState.def += LV_UP_TABLE.def;
            playerState.maxCost += LV_UP_TABLE.cost;
            playerState.hp = getPlayerBattleStats().maxHp;
            playerState.mp = getPlayerBattleStats().maxMp;
            lvupCount += 1;
        }
        return lvupCount;
    }

    function enemyDrop(enemy, preferHeart = false) {
        if (!enemy || !enemy.drops || enemy.drops.length === 0) return null;
        const rate = enemy.isMega ? 0.88 : 0.62;
        if (Math.random() > rate) return null;
        const hearts = enemy.drops.filter(d => ITEM_DEFS[d]?.type === "heart");
        if (preferHeart && hearts.length && Math.random() > 0.25) {
            return hearts[Math.floor(Math.random() * hearts.length)];
        }
        return enemy.drops[Math.floor(Math.random() * enemy.drops.length)];
    }

    function spawnPurpleMist(worldPos, scale = 1) {
        const group = new THREE.Group();
        group.position.copy(worldPos);
        const parts = [];
        for (let i = 0; i < 10; i++) {
            const s = new THREE.Mesh(
                new THREE.SphereGeometry((1.2 + Math.random() * 1.8) * scale, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x9933ff, transparent: true, opacity: 0.65 })
            );
            s.position.set((Math.random() - 0.5) * 5 * scale, 1 + Math.random() * 4 * scale, (Math.random() - 0.5) * 5 * scale);
            group.add(s);
            parts.push(s);
        }
        scene.add(group);
        defeatEffects.push({ group, parts, start: performance.now(), duration: 1600 });
        return group;
    }

    function updateDefeatEffects(now) {
        for (let i = defeatEffects.length - 1; i >= 0; i--) {
            const eff = defeatEffects[i];
            const t = (now - eff.start) / eff.duration;
            if (t >= 1) {
                scene.remove(eff.group);
                eff.parts.forEach(p => p.geometry?.dispose());
                defeatEffects.splice(i, 1);
                continue;
            }
            eff.parts.forEach(p => {
                p.material.opacity = 0.7 * (1 - t);
                p.scale.setScalar(1 + t * 1.8);
                p.position.y += 0.04;
            });
        }
    }

    async function handleEnemyDefeated(damageLog) {
        const enemy = battleState.enemy;
        if (!enemy || !currentBattleMonster) return;
        battleState.busy = true;
        setBattleButtonsEnabled(false);
        document.getElementById('battle-command-window').style.display = 'none';
        updateBattleUI(`${damageLog}\n${enemy.name}を たおした！`);

        const mistPos = currentBattleMonster.group.position.clone();
        mistPos.y += enemy.isMega ? 6 : 3;
        spawnPurpleMist(mistPos, enemy.isMega ? 2.2 : 1.2);

        currentBattleMonster.group.children.forEach(c => {
            if (c.material) {
                c.material.transparent = true;
                c.material.opacity = 0.85;
            }
        });

        await sleep(500);
        const dropped = enemyDrop(enemy, true);
        if (dropped) {
            inventory.push(dropped);
            updateInventoryUI();
            const isHeart = ITEM_DEFS[dropped]?.type === "heart";
            showMessage(isHeart
                ? `紫の靄の中から\n${dropped}が 落ちてきた！`
                : `${dropped}を てにいれた！`);
            updateBattleUI(`${damageLog}\n${enemy.name}を たおした！\n${dropped}を おとした！`);
        }

        await sleep(1100);
        endBattle(true, `${damageLog}\n${enemy.name}を たおした！`, { skipDrop: true, dropped });
    }

    function endBattle(isWin, logText, options = {}) {
        updateBattleUI(logText);
        setTimeout(() => {
            if (isWin && battleState.enemy) {
                const gained = battleState.enemy.exp;
                const gainedGold = battleState.enemy.isMega ? (50 + battleState.enemy.lv * 12) : (8 + battleState.enemy.lv * 5);
                const lvups = grantExp(gained);
                const dropped = options.dropped ?? (options.skipDrop ? null : enemyDrop(battleState.enemy));
                playerState.gold += gainedGold;
                if (dropped && !options.skipDrop) inventory.push(dropped);
                addQuestProgress("battle", 1);
                storyState.battleWins += 1;
                checkTutorialProgress();
                updateInventoryUI();
                const lvText = lvups > 0 ? `\nLvが ${lvups} あがった！` : "";
                const dropText = dropped ? `\n${dropped} を てにいれた！` : "";
                if (!options.dropped) {
                    showMessage(`${gained} EXP / ${gainedGold}G かくとく！${lvText}${dropText}`);
                } else {
                    showMessage(`${gained} EXP / ${gainedGold}G かくとく！${lvText}`);
                }
            }
            if (currentBattleMonster) {
                if (options.keepEnemy) {
                    currentBattleMonster.active = true;
                    currentBattleMonster.mark.visible = false;
                } else {
                    scene.remove(currentBattleMonster.group);
                }
                currentBattleMonster = null;
            }
            document.getElementById('battle-status-window').style.display = 'none';
            document.getElementById('battle-command-window').style.display = 'none';
            isInBattle = false;
            battleState.enemy = null;
            battleState.animation = null;
            battleState.busy = false;
            battleState.playerTurn = true;
            leaveBattleCamera();
            updatePlayerWindow();
        }, 600);
    }

    async function onBattleAttack() {
        if (!isInBattle || battleState.busy || !battleState.playerTurn) return;
        const enemy = battleState.enemy;
        if (!enemy) return;
        battleState.busy = true;
        setBattleButtonsEnabled(false);
        const motion = startBattleMotion(slimeGroup, currentBattleMonster.group);
        const pStats = getPlayerBattleStats();
        const base = pStats.atk - enemy.def * 0.45;
        const playerDmg = Math.max(2, Math.floor(base + Math.random() * 5));
        await sleep(motion.hitMs);
        enemy.hp -= playerDmg;
        if (enemy.hp <= 0) {
            updateBattleUI(`${enemy.name}に ${playerDmg} ダメージ！\n${enemy.name}を たおした！`);
            await sleep(Math.max(0, motion.totalMs - motion.hitMs + 120));
            await handleEnemyDefeated(`${enemy.name}に ${playerDmg} ダメージ！`);
            return;
        }
        updateBattleUI(`${enemy.name}に ${playerDmg} ダメージ！\n${enemy.name}の こうげき...`);
        await sleep(Math.max(0, motion.totalMs - motion.hitMs + 140));
        await enemyTurn();
    }

    async function onBattleSkill() {
        if (!isInBattle || battleState.busy || !battleState.playerTurn) return;
        const enemy = battleState.enemy;
        if (!enemy) return;
        
        const job = JOB_DEFS[playerState.job] || JOB_DEFS["戦士"];
        if (playerState.mp < job.mpCost) {
            updateBattleUI("MPが たりない！");
            return;
        }
        
        playerState.mp -= job.mpCost;
        battleState.busy = true;
        setBattleButtonsEnabled(false);
        const motion = startBattleMotion(slimeGroup, currentBattleMonster.group, { dashMs: 240, holdMs: 200, backMs: 300, reach: 7.8 });
        
        const pStats = getPlayerBattleStats();
        let logText = "";
        if (job.skill === "ホイミ") {
            const healAmount = job.heal || 25;
            playerState.hp = Math.min(pStats.maxHp, playerState.hp + healAmount);
            logText = `ホイミ！ HPが ${healAmount} かいふくした！\n${enemy.name}の こうげき...`;
            await sleep(motion.hitMs);
        } else {
            const dmg = Math.max(5, Math.floor((pStats.atk * (job.skillDmg || 1.3)) - enemy.def * 0.4 + Math.random() * 8));
            await sleep(motion.hitMs);
            enemy.hp -= dmg;
            if (enemy.hp <= 0) {
                updateBattleUI(`${job.skill}！ ${dmg} ダメージ！\n${enemy.name}を たおした！`);
                await sleep(Math.max(0, motion.totalMs - motion.hitMs + 140));
                await handleEnemyDefeated(`${job.skill}！ ${dmg} ダメージ！`);
                return;
            }
            logText = `${job.skill}！ ${dmg} ダメージ！\n${enemy.name}の こうげき...`;
        }
        
        updateBattleUI(logText);
        await sleep(Math.max(0, motion.totalMs - motion.hitMs + 150));
        await enemyTurn();
    }

    async function onBattleRun() {
        if (!isInBattle || battleState.busy || !battleState.playerTurn) return;
        battleState.busy = true;
        setBattleButtonsEnabled(false);
        if (Math.random() > 0.4) {
            endBattle(false, "うまく にげきれた！", { keepEnemy: true });
        } else {
            updateBattleUI("にげられない！");
            await sleep(260);
            await enemyTurn();
        }
    }

    async function onBattleGuard() {
        if (!isInBattle || battleState.busy || !battleState.playerTurn) return;
        battleState.busy = true;
        battleState.guardRate = 0.45;
        setBattleButtonsEnabled(false);
        updateBattleUI("みを まもっている...");
        await sleep(300);
        await enemyTurn();
    }

    async function onBattleItem() {
        if (!isInBattle || battleState.busy || !battleState.playerTurn) return;
        battleState.busy = true;
        setBattleButtonsEnabled(false);
        if (inventory.length === 0) {
            updateBattleUI("どうぐが ない！");
            battleState.busy = false;
            setBattleButtonsEnabled(true);
            return;
        }
        const itemIndex = inventory.findIndex(name => (ITEM_DEFS[name]?.type) === "consumable");
        if (itemIndex < 0) {
            updateBattleUI("せんとうで つかえるどうぐが ない！");
            battleState.busy = false;
            setBattleButtonsEnabled(true);
            return;
        }
        const itemName = inventory.splice(itemIndex, 1)[0];
        const heal = ITEM_DEFS[itemName]?.heal || 8;
        playerState.hp = Math.min(getPlayerBattleStats().maxHp, playerState.hp + heal);
        updateInventoryUI();
        updatePlayerWindow();
        updateBattleUI(`${itemName}を つかった！\nHPが かいふくした`);
        await sleep(420);
        await enemyTurn();
    }

    async function enemyTurn() {
        if (!isInBattle || !battleState.enemy || !currentBattleMonster) return;
        battleState.playerTurn = false;
        const motion = startBattleMotion(currentBattleMonster.group, slimeGroup);
        const enemy = battleState.enemy;
        const pStats = getPlayerBattleStats();
        const base = enemy.atk - pStats.def * 0.35;
        const enemyDmg = Math.max(1, Math.floor((base + Math.random() * 4) * battleState.guardRate));
        battleState.guardRate = 1.0;
        await sleep(motion.hitMs);
        playerState.hp -= enemyDmg;
        if (playerState.hp <= 0) {
            playerState.hp = Math.floor(getPlayerBattleStats().maxHp * 0.6);
            await sleep(Math.max(0, motion.totalMs - motion.hitMs + 120));

        updateBattleUI(`${enemy.name}の こうげき！ ${enemyDmg} ダメージ`);
        await sleep(Math.max(0, motion.totalMs - motion.hitMs + 150));
        battleState.playerTurn = true;
