<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DQW 3D - Ideal Map Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #gui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0, 0, 40, 0.85); color: white; padding: 12px;
            border: 2px solid #fff; border-radius: 8px; width: 160px; text-align: center;
            pointer-events: none;
        }
        #env-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px;
            border: 1px solid #00ffff; width: 220px; font-size: 11px; border-radius: 8px;
        }
        .ctrl-group { margin-bottom: 8px; }
        input[type=range] { width: 100%; cursor: pointer; pointer-events: auto; }
        button { pointer-events: auto; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; padding: 4px 0; }
        button.active { background: #00ffff; color: #000; font-weight: bold; }
        #clock-display { font-size: 26px; font-weight: bold; color: #0f0; text-shadow: 0 0 8px #0f0; }
        #update-btn { width: 100%; background: #ffd700; border: none; padding: 8px; font-weight: bold; border-radius: 4px; margin-top: 8px; color: #000; }
        #update-btn:disabled { opacity: 0.55; cursor: wait; }
        #map-loading {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 24, 0.6);
            transition: opacity 0.25s ease, visibility 0.25s;
        }
        #map-loading.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }
        .map-loading-box {
            text-align: center; color: #fff;
            padding: 20px 28px; border-radius: 10px;
            background: rgba(0, 0, 40, 0.92); border: 2px solid #00ffff;
            box-shadow: 0 0 24px rgba(0, 255, 255, 0.25);
        }
        .map-loading-box p { margin: 0 0 14px; font-size: 15px; letter-spacing: 0.05em; }
        .map-loading-track {
            width: 260px; height: 10px; background: #1a1a2e;
            border-radius: 5px; overflow: hidden; border: 1px solid #446;
        }
        .map-loading-bar {
            height: 100%; width: 35%;
            background: linear-gradient(90deg, #0088aa, #00ffff, #0088aa);
            border-radius: 5px;
            animation: map-load-indeterminate 1.1s ease-in-out infinite;
        }
        @keyframes map-load-indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(380%); }
        }
    </style>
</head>
<body>

<div id="gui">
    <div id="clock-display">00:00</div>
    <button id="update-btn" onclick="manualUpdate()">＊周囲を更新</button>
</div>

<div id="env-panel">
    <div class="ctrl-group">
        <label>じかん調整: <span id="v-time">--:--</span></label>
        <input type="range" id="r-time" min="0" max="1435" step="5" value="720" oninput="changeEnvManual()">
    </div>
    <div class="ctrl-group">
        <label>てんき</label>
        <button id="btn-sunny" class="active" onclick="setWeather('sunny', this)" style="width:31%">はれ</button>
        <button id="btn-cloudy" onclick="setWeather('cloudy', this)" style="width:31%">くもり</button>
        <button id="btn-rainy" onclick="setWeather('rainy', this)" style="width:31%">あめ</button>
    </div>
</div>

<div id="map-loading" class="hidden" aria-hidden="true" role="status">
    <div class="map-loading-box">
        <p>地図を読み込み中…</p>
        <div class="map-loading-track"><div class="map-loading-bar"></div></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, roadLayer, mapLayer, slimeGroup;
    let stars, rain, clouds, ground, ambientLight, sunLight, sunBall;
    let centerPos = { lat: 38.2602, lon: 140.8824 }; 
    let playerOffset = { x: 0, z: 0 };
    let currentWeather = 'sunny';
    let isManualTime = false;
    let mapFetchInFlight = 0;
    const R = 6378137;

    function updateMapLoadingUI() {
        const el = document.getElementById('map-loading');
        const btn = document.getElementById('update-btn');
        const busy = mapFetchInFlight > 0;
        el.classList.toggle('hidden', !busy);
        el.setAttribute('aria-hidden', busy ? 'false' : 'true');
        if (btn) btn.disabled = busy;
    }

    const skyColors = [
        { time: 0,    col: 0x020512 }, { time: 300,  col: 0x0c2461 }, { time: 420,  col: 0x82ccdd },
        { time: 720,  col: 0x00d2ff }, { time: 1020, col: 0x00d2ff }, { time: 1080, col: 0xf39c12 },
        { time: 1140, col: 0xe67e22 }, { time: 1320, col: 0x020512 }, { time: 1440, col: 0x020512 }
    ];

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 80, 120);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.2; 

        roadLayer = new THREE.Group(); scene.add(roadLayer);
        mapLayer = new THREE.Group(); scene.add(mapLayer);

        // 1. 地面：多色の草（茂み）を表現するためのグリッドテクスチャ風設定
        const groundSize = 40000;
        const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, 100, 100);
        // Canvasを使用して茂みのような「いろいろな色の緑」を生成
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        for(let x=0; x<512; x+=32){
            for(let y=0; y<512; y+=32){
                const g = 120 + Math.random() * 40;
                ctx.fillStyle = `rgb(40, ${g}, 40)`;
                ctx.fillRect(x, y, 32, 32);
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.strokeRect(x, y, 32, 32);
            }
        }
        const groundTex = new THREE.CanvasTexture(canvas);
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(500, 500);

        ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ map: groundTex }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // スライム（角付き）
        slimeGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        body.scale.set(1.1, 0.85, 1.1);
        const horn = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 32), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        horn.position.y = 1.5;
        slimeGroup.add(body); slimeGroup.add(horn);
        slimeGroup.position.y = 3; 
        scene.add(slimeGroup);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
        sunBall = new THREE.Mesh(new THREE.SphereGeometry(20, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        scene.add(sunBall);

        createStars(); 
        createRainlines();
        createClouds();
        updateRealTime(); 
        startTracking();
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function createRainlines() {
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 3000; i++) {
            const x = THREE.MathUtils.randFloatSpread(1000);
            const y = THREE.MathUtils.randFloat(0, 600);
            const z = THREE.MathUtils.randFloatSpread(1000);
            pos.push(x, y, z, x, y + 6, z);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        rain = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xccddee, transparent: true, opacity: 0.4 }));
        rain.visible = false;
        scene.add(rain);
    }

    function renderMap(elements, cLat, cLon) {
        roadLayer.clear(); mapLayer.clear();
        const lonScale = (Math.PI * R * Math.cos(cLat * Math.PI / 180)) / 180;
        const latScale = (2 * Math.PI * R) / 360;

        elements.forEach(el => {
            if (!el.geometry || el.geometry.length < 2) return;
            const pts3D = el.geometry.map(p => new THREE.Vector3((p.lon - cLon) * lonScale, 0, -(p.lat - cLat) * latScale));
            const pts2D = el.geometry.map(p => new THREE.Vector2((p.lon - cLon) * lonScale, -(p.lat - cLat) * latScale));
            const curve = new THREE.CatmullRomCurve3(pts3D);

            if (el.tags.building) {
                // 2. 建物：灰色の面に白い太枠
                // 外枠（白い枠線）を TubeGeometry で表現
                const bTubeGeo = new THREE.TubeGeometry(curve, pts3D.length, 0.8, 8, true); 
                const bOutline = new THREE.Mesh(bTubeGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                bOutline.position.y = 1.0; 
                mapLayer.add(bOutline);

                // 塗りつぶし（灰色）
                const shape = new THREE.Shape(pts2D);
                const bFill = new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshLambertMaterial({ 
                    color: 0x888888, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1.0 
                }));
                bFill.rotation.x = -Math.PI / 2; bFill.position.y = 0.8;
                mapLayer.add(bFill);
            } else if (el.tags.highway) {
                // 3. 道路：純白（Unlit）
                const rGeo = new THREE.TubeGeometry(curve, pts3D.length * 2, 4, 8, false);
                const rMesh = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                rMesh.position.y = 0.2; rMesh.scale.set(1, 0.01, 1); // 地面に密着させる
                roadLayer.add(rMesh);
            }
        });
        updateWeatherVisuals();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (rain && rain.visible) {
            const pos = rain.geometry.attributes.position.array;
            for (let i = 1; i < pos.length; i += 6) {
                pos[i] -= 18; pos[i + 3] -= 18;
                if (pos[i] < 0) { pos[i] = 600; pos[i + 3] = 606; }
            }
            rain.geometry.attributes.position.needsUpdate = true;
            rain.position.copy(slimeGroup.position);
        }
        controls.target.lerp(slimeGroup.position, 0.1);
        controls.update();
        renderer.render(scene, camera);
    }

    function applyTimeEffect(totalMinutes) {
        const h = Math.floor(totalMinutes / 60); const m = totalMinutes % 60;
        const timeStr = h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
        document.getElementById('clock-display').innerText = timeStr;
        document.getElementById('v-time').innerText = timeStr;
        let s, e;
        for (let i = 0; i < skyColors.length - 1; i++) {
            if (totalMinutes >= skyColors[i].time && totalMinutes <= skyColors[i + 1].time) {
                s = skyColors[i]; e = skyColors[i+1]; break;
            }
        }
        const ratio = (totalMinutes - s.time) / (e.time - s.time);
        let skyCol = new THREE.Color(s.col).lerp(new THREE.Color(e.col), ratio);
        if (currentWeather === 'rainy') skyCol.multiplyScalar(0.4);
        scene.background = skyCol;
        stars.material.opacity = (currentWeather === 'sunny' && (totalMinutes >= 1140 || totalMinutes <= 300)) ? 1.0 : 0;
        const sunAngle = ((totalMinutes - 360) / 1440) * Math.PI * 2; 
        sunBall.position.set(Math.cos(sunAngle) * 2000, Math.sin(sunAngle) * 1000, 300); 
        sunLight.position.copy(sunBall.position);
        updateWeatherVisuals();
    }

    function setWeather(t, btn) {
        currentWeather = t;
        document.querySelectorAll('.ctrl-group button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyTimeEffect(parseInt(document.getElementById('r-time').value));
    }

    function updateWeatherVisuals() {
        if (!ground) return;
        rain.visible = (currentWeather === 'rainy');
        ground.material.color.setHex((currentWeather === 'rainy') ? 0x555555 : 0xffffff); // 雨天時は全体を暗く
        clouds.children.forEach(c => c.material.opacity = (currentWeather === 'sunny') ? 0 : 0.8);
    }

    function onKeyDown(e) {
        const step = 8.0;
        let mx = 0, mz = 0;
        if (e.key === "w") mz = -step; if (e.key === "s") mz = step;
        if (e.key === "a") mx = -step; if (e.key === "d") mx = step;
        if (mx !== 0 || mz !== 0) {
            playerOffset.x += mx; playerOffset.z += mz;
            slimeGroup.position.set(playerOffset.x, 3, playerOffset.z);
            slimeGroup.rotation.y = Math.atan2(mx, mz);
        }
    }

    function updateRealTime() { if (!isManualTime) { const n = new Date(); applyTimeEffect(n.getHours()*60+n.getMinutes()); } setTimeout(updateRealTime, 1000); }
    function changeEnvManual() { isManualTime = true; applyTimeEffect(parseInt(document.getElementById('r-time').value)); }
    function createStars() {
        const geo = new THREE.BufferGeometry(); const pts = [];
        for(let i=0; i<8000; i++) pts.push(THREE.MathUtils.randFloatSpread(5000), 1000, THREE.MathUtils.randFloatSpread(5000));
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
        stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0 }));
        scene.add(stars);
    }
    function createClouds() {
        clouds = new THREE.Group();
        for(let i=0; i<15; i++) {
            const c = new THREE.Mesh(new THREE.SphereGeometry(60, 8, 8), new THREE.MeshLambertMaterial({color: 0x888888, transparent: true, opacity: 0}));
            c.position.set(THREE.MathUtils.randFloatSpread(3000), 400, THREE.MathUtils.randFloatSpread(3000));
            c.scale.set(8, 0.5, 6); clouds.add(c);
        }
        scene.add(clouds);
    }
    async function fetchMapData(lat, lon) {
        mapFetchInFlight++;
        updateMapLoadingUI();
        const q = `[out:json];(way["highway"](around:600,${lat},${lon});way["building"](around:600,${lat},${lon}););out geom;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderMap(data.elements, lat, lon);
        } catch (e) {
            console.error("Map Error", e);
        } finally {
            mapFetchInFlight--;
            updateMapLoadingUI();
        }
    }
    function manualUpdate() {
        centerPos.lat -= (playerOffset.z / (2 * Math.PI * R / 360));
        centerPos.lon += (playerOffset.x / ((Math.PI * R * Math.cos(centerPos.lat * Math.PI / 180)) / 180));
        playerOffset = { x: 0, z: 0 }; slimeGroup.position.set(0, 3, 0); fetchMapData(centerPos.lat, centerPos.lon);
    }
    function startTracking() { navigator.geolocation.getCurrentPosition(p => { centerPos = { lat: p.coords.latitude, lon: p.coords.longitude }; fetchMapData(centerPos.lat, centerPos.lon); }, () => fetchMapData(centerPos.lat, centerPos.lon)); }
    function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    init();
</script>
</body>
</html>
