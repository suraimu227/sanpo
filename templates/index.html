<!DOCTYPE html>
<html>
<head>
    <title>DQW Walk - Optimized Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DotGothic16', sans-serif; margin: 0; display: flex; height: 100vh; background: #000; color: white; overflow: hidden; }
        
        /* サイドバー：王道ドラクエUI */
        #sidebar { 
            width: 30%; padding: 20px; border-right: 4px double #fff;
            overflow-y: auto; box-sizing: border-box; z-index: 10; background: #000080; 
        }
        
        /* マップ：DQW風フィルタ */
        #map { 
            width: 70%; height: 100%; z-index: 1; background: #1a2a1a;
            filter: hue-rotate(10deg) saturate(1.7) brightness(0.95) contrast(1.1);
        }

        .card { background: #000; padding: 15px; border: 3px solid #fff; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 1.2rem; text-shadow: 2px 2px #000; margin-bottom: 15px; }

        /* オブジェクト共通スタイル（スライム形状） */
        .object { 
            width: 40px; height: 40px; 
            border-radius: 0 50% 50% 50%; 
            transform: rotate(45deg); 
            border: 2px solid #fff;
            position: relative; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        
        .monster { background-color: #ff8c00; }
        .monster::after { 
            content: "● ●\A ∪"; 
            white-space: pre; position: absolute; color: white; 
            font-size: 10px; font-weight: bold; text-align: center; 
            width: 100%; transform: rotate(-45deg); 
            top: 12px; left: 0px; line-height: 1;
        }

        .pot { 
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); 
            box-shadow: 0 0 10px #ffd700;
        }
        .pot::after { 
            content: "🏺"; 
            position: absolute; 
            font-size: 18px; 
            text-align: center; 
            width: 100%; 
            transform: rotate(-45deg);
            top: 10px; left: -1px;
        }

        .player { 
            background-color: #00d2ff; width: 45px; height: 45px; z-index: 1000; 
        }
        .player::after { 
            content: "● ●\A ∪"; 
            white-space: pre; position: absolute; color: white; 
            font-size: 12px; font-weight: bold; text-align: center; 
            width: 100%; transform: rotate(-45deg); 
            top: 14px; left: 0px; line-height: 1;
        }

        /* 青い探索サークル */
        .range-circle { 
            pointer-events: none; 
            stroke: #00ffff; stroke-width: 3; 
            fill: #00ffff; fill-opacity: 0.15;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { fill-opacity: 0.1; stroke-opacity: 0.5; }
            50% { fill-opacity: 0.2; stroke-opacity: 0.9; }
            100% { fill-opacity: 0.1; stroke-opacity: 0.5; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>＊「ぼうけんのきろく」</h1>
    <div class="card">
        <p id="status">ちかくを　たんさく中...</p>
        <p id="stats" style="color: #ffd700; font-size: 0.9rem;">たおした数: 0<br>わったツボ: 0</p>
    </div>

    <div class="card">
        <h3>［　ステータス　］</h3>
        <div id="result">
            レベル： --<br>
            都会Ｐ： --<br>
            自然Ｐ： --
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    let map, playerMarker, rangeCircle, objectLayer;
    let roadCoords = [];
    let counts = { monster: 0, pot: 0 };
    const INTERACTION_RANGE = 50; 
    const VIEW_LIMIT_RANGE = 400; // 最大探索半径を1kmから400mへ縮小

    function initMap() {
        // ズーム設定をより実用的な範囲に固定
        map = L.map('map', { 
            zoomControl: true, 
            minZoom: 16, // 引きすぎ防止
            maxZoom: 18  // 寄りすぎによる描画消失防止
        }).setView([38.2601, 140.8822], 17);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png').addTo(map);

        objectLayer = L.layerGroup().addTo(map);

        const playerIcon = L.divIcon({ className: '', html: "<div class='object player'></div>", iconSize: [45, 45], iconAnchor: [22, 22] });
        playerMarker = L.marker([38.2601, 140.8822], { icon: playerIcon, zIndexOffset: 1000 }).addTo(map);

        rangeCircle = L.circle([38.2601, 140.8822], {
            radius: INTERACTION_RANGE, className: 'range-circle'
        }).addTo(map);

        // 中心移動の制限を400mに強化
        map.on('move', function() {
            const dist = map.getCenter().distanceTo(playerMarker.getLatLng());
            if (dist > VIEW_LIMIT_RANGE) map.panTo(playerMarker.getLatLng());
        });

        startTracking();
    }

    function startTracking() {
        navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
    }

    async function updatePosition(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const pos = [lat, lon];

        playerMarker.setLatLng(pos);
        rangeCircle.setLatLng(pos);

        // 道路情報を取得（範囲を狭めて密度を濃くする）
        if (roadCoords.length === 0) await fetchRoads(lat, lon);

        try {
            const res = await fetch(`/walk?lat=${lat}&lon=${lon}&steps=20`);
            const data = await res.json();
            document.getElementById('result').innerHTML = `レベル： ${data.status.level}<br>都会Ｐ： ${data.status.city}<br>自然Ｐ： ${data.status.nature}`;
        } catch(e){}
    }

    async function fetchRoads(lat, lon) {
        const query = `[out:json];way["highway"](around:${VIEW_LIMIT_RANGE},${lat},${lon});out geom;`;
        const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            roadCoords = [];
            data.elements.forEach(way => way.geometry.forEach(pt => roadCoords.push([pt.lat, pt.lon])));
            if (roadCoords.length > 0) spawnObjects();
        } catch(e){}
    }

    function spawnObjects() {
        objectLayer.clearLayers();
        if (roadCoords.length === 0) return;

        // 400m圏内に15個配置することで密度を上げる
        for (let i = 0; i < 15; i++) {
            const coord = roadCoords[Math.floor(Math.random() * roadCoords.length)];
            const isPot = Math.random() > 0.7; 
            const type = isPot ? 'pot' : 'monster';
            
            const icon = L.divIcon({ 
                className: '', html: `<div class='object ${type}'></div>`, 
                iconSize: [40, 40], iconAnchor: [20, 20] 
            });

            const marker = L.marker(coord, { icon: icon }).addTo(objectLayer);
            
            marker.on('click', () => {
                const dist = playerMarker.getLatLng().distanceTo(marker.getLatLng());
                if (dist <= INTERACTION_RANGE) {
                    objectLayer.removeLayer(marker);
                    if (isPot) {
                        counts.pot++;
                        document.getElementById('status').innerText = "＊「スライムのツボを　わった！";
                    } else {
                        counts.monster++;
                        document.getElementById('status').innerText = "＊「モンスターを　たおした！";
                    }
                    updateStats();
                    setTimeout(spawnObjects, 2000);
                } else {
                    document.getElementById('status').innerText = "＊「とおい！　もっと　ちかづこう！";
                }
            });
        }
    }

    function updateStats() {
        document.getElementById('stats').innerHTML = `たおした数: ${counts.monster}<br>わったツボ: ${counts.pot}`;
    }

    initMap();
</script>

</body>
</html>
