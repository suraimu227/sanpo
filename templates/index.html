<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DQW 3D - Fixed Wireframe Sync</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Press Start 2P', cursive; touch-action: none; }
        #gui {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: #000; color: #fff; padding: 15px;
            border: 4px solid #fff; width: 160px; text-align: center;
        }
        #clock-text { font-size: 16px; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        #weather-info { font-size: 8px; line-height: 1.5; margin-bottom: 12px; border-top: 2px solid #fff; padding-top: 8px; color: #aaa; }
        #debug-update-btn { background: #444; color: #fff; border: 2px solid #fff; padding: 5px; font-family: 'Press Start 2P'; font-size: 7px; cursor: pointer; width: 100%; }
        #bag-gui { position: absolute; bottom: 20px; left: 20px; z-index: 1100; }
        #bag-btn { background: #000; color: #fff; border: 3px solid #fff; padding: 10px 15px; font-family: "Press Start 2P"; font-size: 9px; cursor: pointer; }
        #inventory-window { position: absolute; bottom: 60px; left: 0; width: 220px; background: #000; border: 3px solid #fff; color: #fff; padding: 15px; display: none; font-size: 10px; line-height: 1.8; }
        #message-window { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 1500; background: #000; border: 4px solid #fff; color: #fff; padding: 15px 25px; font-size: 10px; min-width: 280px; display: none; text-align: center; }
        #map-loading { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        #map-loading.hidden { display: none; }
        .load-window { background: #000; border: 4px solid #fff; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .load-text { color: #fff; font-size: 10px; margin-bottom: 20px; }
        .small-load-bar { width: 200px; height: 12px; border: 2px solid #fff; position: relative; overflow: hidden; }
        .small-load-fill { height: 100%; width: 70px; background: #fff; position: absolute; animation: bar-move 1.2s linear infinite; }
        @keyframes bar-move { 0% { left: -70px; } 100% { left: 200px; } }
    </style>
</head>
<body>

<div id="gui">
    <span id="clock-text">00:00</span>
    <div id="weather-info">LOADING...</div>
    <button id="debug-update-btn" onclick="manualUpdate()">UPDATE(Debug)</button>
</div>

<div id="bag-gui">
    <div id="inventory-window">
        <div style="border-bottom: 2px solid #fff; margin-bottom: 10px; padding-bottom: 5px;">ITEM LIST</div>
        <div id="item-list">EMPTY</div>
    </div>
    <button id="bag-btn" onclick="toggleBag()">BAG</button>
</div>

<div id="message-window"></div>

<div id="map-loading">
    <div class="load-window">
        <div class="load-text">LOADING MAP...</div>
        <div class="small-load-bar"><div class="small-load-fill"></div></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, roadLayer, mapLayer, slimeGroup;
    let baseCoords = null;
    let lastFetchedCoords = null;
    let keyState = {};
    let isFetching = false;
    let spots = [], monsters = [];
    
    const R = 6378137;
    const MAP_RADIUS = 800; 
    const AUTO_UPDATE_THRESHOLD = 300;
    const CAMERA_DIST = 75;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        roadLayer = new THREE.Group(); scene.add(roadLayer);
        mapLayer = new THREE.Group(); scene.add(mapLayer);

        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        for(let y=0; y<4; y++){
            for(let x=0; x<4; x++){
                const g = 70 + Math.floor(Math.random() * 50);
                ctx.fillStyle = `rgb(40, ${g}, 35)`;
                ctx.fillRect(x*64, y*64, 64, 64);
                ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.strokeRect(x*64, y*64, 64, 64);
            }
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(500, 500);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30000, 30000), new THREE.MeshLambertMaterial({ map: texture }));
        ground.rotation.x = -Math.PI / 2; scene.add(ground);

        slimeGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(3, 24, 24), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        body.scale.set(1.1, 0.85, 1.1);
        const horn = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 16), new THREE.MeshPhongMaterial({ color: 0x00BFFF }));
        horn.position.y = 1.5; slimeGroup.add(body); slimeGroup.add(horn);
        
        // 青の判定円
        const ringGeo = new THREE.RingGeometry(10.8, 11, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x0000FF, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2; ring.position.y = -2.8;
        slimeGroup.add(ring);
        
        slimeGroup.position.set(0, 3, 0); scene.add(slimeGroup);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = CAMERA_DIST; controls.maxDistance = CAMERA_DIST;
        controls.target.copy(slimeGroup.position);
        camera.position.set(0, 60, 80);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.4); sunLight.position.set(50, 200, 100); scene.add(sunLight);

        updateRealTime();
        startTracking();
        
        window.addEventListener('keydown', (e) => keyState[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keyState[e.key.toLowerCase()] = false);
        window.addEventListener('resize', onWindowResize);
        animate();
    }

    async function fetchMapData(lat, lon) {
        if (isFetching) return;
        isFetching = true;
        lastFetchedCoords = { lat, lon };
        document.getElementById('map-loading').classList.remove('hidden');
        
        const q = `[out:json][timeout:30];(way["highway"](around:${MAP_RADIUS},${lat},${lon});way["building"](around:${MAP_RADIUS},${lat},${lon}););out geom;`;
        
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
            const data = await res.json();
            
            roadLayer.clear(); mapLayer.clear();
            
            data.elements.forEach(el => {
                if (!el.geometry || !el.tags) return;
                const pts3D = el.geometry.map(p => {
                    const dx = (p.lon - baseCoords.lon) * ((Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180);
                    const dz = -(p.lat - baseCoords.lat) * ((2 * Math.PI * R) / 360);
                    return new THREE.Vector3(dx, 0, dz);
                });

                if (el.tags.building) {
                    const wallH = el.tags['building:levels'] ? parseFloat(el.tags['building:levels']) * 3.5 : 10;
                    
                    // 1. 底面の枠線 (灰色)
                    const bottomPoints = pts3D.map(p => new THREE.Vector3(p.x, 0.3, p.z));
                    bottomPoints.push(bottomPoints[0]);
                    const bGeo = new THREE.BufferGeometry().setFromPoints(bottomPoints);
                    mapLayer.add(new THREE.Line(bGeo, new THREE.LineBasicMaterial({ color: 0x888888 })));

                    // 2. 天面の枠線 (灰色) - 底面を複製して高さを上げる
                    const topPoints = pts3D.map(p => new THREE.Vector3(p.x, wallH + 0.3, p.z));
                    topPoints.push(topPoints[0]);
                    const tGeo = new THREE.BufferGeometry().setFromPoints(topPoints);
                    mapLayer.add(new THREE.Line(tGeo, new THREE.LineBasicMaterial({ color: 0x888888 })));

                    // 3. 建物本体 (この上下の枠線の間に配置)
                    const shape = new THREE.Shape(pts3D.map(p => new THREE.Vector2(p.x, p.z)));
                    const extrudeSettings = { depth: wallH, bevelEnabled: false };
                    const bMesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, extrudeSettings), new THREE.MeshLambertMaterial({ color: 0x444444, transparent: true, opacity: 0.8 }));
                    bMesh.rotation.x = -Math.PI / 2; bMesh.position.y = 0.3; 
                    mapLayer.add(bMesh);
                } else if (el.tags.highway) {
                    const curve = new THREE.CatmullRomCurve3(pts3D);
                    const rMesh = new THREE.Mesh(new THREE.TubeGeometry(curve, Math.max(16, pts3D.length * 2), 3.5, 4, false), new THREE.MeshBasicMaterial({ color: 0x999999 }));
                    rMesh.position.y = 0.15; rMesh.scale.set(1, 0.01, 1); roadLayer.add(rMesh);
                }
            });
            createObjects();
        } catch (e) {
            showMessage("LOAD ERROR");
        } finally {
            isFetching = false;
            setTimeout(() => document.getElementById('map-loading').classList.add('hidden'), 800);
        }
    }

    // --- その他ロジック(Weather, Tracking, Movement等)は前バージョンを維持 ---
    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await res.json();
            const temp = Math.round(data.current_weather.temperature);
            const status = data.current_weather.weathercode <= 3 ? "CLEAR" : "RAIN";
            document.getElementById('weather-info').innerHTML = `${status}<br>${temp}°C`;
        } catch (e) { document.getElementById('weather-info').textContent = "WEATHER ERROR"; }
    }

    function createObjects() {
        spots.forEach(s => scene.remove(s.mesh)); monsters.forEach(m => scene.remove(m.mesh));
        spots = []; monsters = [];
        for(let i=0; i<20; i++){
            const rx = (Math.random()-0.5)*1200 + slimeGroup.position.x;
            const rz = (Math.random()-0.5)*1200 + slimeGroup.position.z;
            if(Math.random() > 0.5) {
                const g = new THREE.Group();
                const p = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 15, 8), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 }));
                p.position.y = 7.5; g.add(p); g.position.set(rx, 0.1, rz); scene.add(g);
                spots.push({ mesh: g, active: true });
            } else {
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.SphereGeometry(3, 12, 12), new THREE.MeshPhongMaterial({ color: 0xff4444 }));
                g.add(b); g.position.set(rx, 3, rz); scene.add(g);
                monsters.push({ mesh: g, active: true, velocity: new THREE.Vector3(0,0,0), nextMoveTime: 0 });
            }
        }
    }

    function checkAutoUpdate() {
        if (!baseCoords || !lastFetchedCoords || isFetching) return;
        const latScale = (2 * Math.PI * R) / 360;
        const lonScale = (Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180;
        const currentLat = baseCoords.lat - (slimeGroup.position.z / latScale);
        const currentLon = baseCoords.lon + (slimeGroup.position.x / lonScale);
        const dx = (currentLon - lastFetchedCoords.lon) * lonScale;
        const dz = (currentLat - lastFetchedCoords.lat) * latScale;
        if (Math.sqrt(dx*dx + dz*dz) > AUTO_UPDATE_THRESHOLD) fetchMapData(currentLat, currentLon);
    }

    function handleMovement() {
        if (keyState['w']) {
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            slimeGroup.position.addScaledVector(dir, 1.4);
            slimeGroup.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), dir), 0.15);
            checkAutoUpdate();
        }
    }

    function startTracking() {
        navigator.geolocation.getCurrentPosition(p => {
            baseCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            fetchMapData(baseCoords.lat, baseCoords.lon);
            fetchWeather(baseCoords.lat, baseCoords.lon);
            setInterval(() => fetchWeather(baseCoords.lat, baseCoords.lon), 600000);
        }, () => {
            baseCoords = { lat: 38.2601, lon: 140.8824 }; 
            fetchMapData(baseCoords.lat, baseCoords.lon);
            fetchWeather(baseCoords.lat, baseCoords.lon);
        }, { timeout: 8000 });
    }

    function manualUpdate() { 
        if(baseCoords && !isFetching) {
            const latScale = (2 * Math.PI * R) / 360;
            const lonScale = (Math.PI * R * Math.cos(baseCoords.lat * Math.PI / 180)) / 180;
            fetchMapData(baseCoords.lat - (slimeGroup.position.z / latScale), baseCoords.lon + (slimeGroup.position.x / lonScale));
        }
    }

    function toggleBag() { const win = document.getElementById('inventory-window'); win.style.display = (win.style.display === 'block') ? 'none' : 'block'; }
    function showMessage(text) { const win = document.getElementById('message-window'); win.textContent = text; win.style.display = 'block'; setTimeout(() => win.style.display = 'none', 3000); }
    function updateRealTime() { const d = new Date(); document.getElementById('clock-text').textContent = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; setTimeout(updateRealTime, 10000); }
    function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

    function animate() {
        requestAnimationFrame(animate);
        handleMovement();
        monsters.forEach(m => {
            if (!m.active) return;
            const now = Date.now();
            if (now > m.nextMoveTime) {
                if (m.velocity.length() === 0) {
                    const a = Math.random() * Math.PI * 2;
                    m.velocity.set(Math.cos(a)*0.2, 0, Math.sin(a)*0.2);
                    m.nextMoveTime = now + 2000;
                } else { m.velocity.set(0,0,0); m.nextMoveTime = now + 3000; }
            }
            m.mesh.position.add(m.velocity);
        });
        spots.forEach((s) => { if (s.active && slimeGroup.position.distanceTo(s.mesh.position) < 11) { s.active = false; showMessage("ITEM GET!"); scene.remove(s.mesh); } });
        monsters.forEach((m) => { if (m.active && slimeGroup.position.distanceTo(m.mesh.position) < 11) { m.active = false; showMessage("WIN!"); scene.remove(m.mesh); } });
        controls.target.lerp(slimeGroup.position, 0.1); controls.update();
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
